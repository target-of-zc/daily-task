[[permission]]
identifier = "allow-tasks"
description = "允许任务相关命令"
commands.allow = [
  "list_tasks",
  "list_scheduled_days",
  "add_task",
  "toggle_task",
  "delete_task",
  "stop_recurring",
  "update_task",
  "reorder_tasks",
  "snooze_task",
  "sync_macro_reminders",
  "get_macro_alarm_enabled",
  "set_macro_alarm_enabled",
  "get_task_counts_by_date",
  "get_dark_theme",
  "set_dark_theme",
  "export_week_csv",
  "list_backups",
  "restore_backup",
  "clear_completed",
  "get_weekly_stats",
  "manual_backup",
  "get_autostart",
  "set_autostart",
  "show_main_window",
  "hide_main_window",
  "minimize_main_window",
  "set_ball_peek",
  "move_ball_by_delta",
  "quit_app",
  "get_always_on_top",
  "set_always_on_top",
  "get_email_settings",
  "set_email_settings",
  "test_email_settings",
]

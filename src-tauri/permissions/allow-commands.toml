[[permission]]
identifier = "allow-tasks"
description = "允许任务相关命令"
commands.allow = [
  "list_tasks",
  "list_scheduled_days",
  "add_task",
  "toggle_task",
  "delete_task",
  "clear_completed",
  "get_weekly_stats",
  "manual_backup",
  "get_autostart",
  "set_autostart",
  "show_main_window",
  "quit_app",
  "get_always_on_top",
  "set_always_on_top",
]
